version: '3.8'

services:
  # Nginx Proxy Layer
  nginx:
    image: nginx:alpine
    container_name: obat-nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./:/var/www/html
    depends_on:
      - php
    networks:
      - app-network
    restart: unless-stopped

  # PHP-FPM Backend
  php:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: obat-php
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=obat-db
      - DB_PORT=3306
      - DB_DATABASE=obat-obatan
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    networks:
      - app-network
    restart: unless-stopped

  # MySQL Database
  obat-db:
    image: mysql:8.0
    container_name: obat-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: obat-obatan
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - obat-db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  obat-db-data:
    driver: local
